<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow - Team Task Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-content">
        <h1 class="logo">TaskFlow</h1>
        <div class="header-actions">
          <span class="task-count" id="task-count">0 tasks</span>
          <button class="btn btn-primary" id="add-task-btn">+ New Task</button>
        </div>
      </div>
    </header>

    <main class="main">
      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="todo">To Do</button>
        <button class="filter-btn" data-filter="in-progress">In Progress</button>
        <button class="filter-btn" data-filter="done">Done</button>
        <div class="search-box">
          <input type="text" id="search-input" placeholder="Search tasks..." />
        </div>
      </div>

      <div class="columns">
        <div class="column" data-status="todo">
          <div class="column-header">
            <h2>To Do</h2>
            <span class="column-count" id="count-todo">0</span>
          </div>
          <div class="task-list" id="list-todo"></div>
        </div>

        <div class="column" data-status="in-progress">
          <div class="column-header">
            <h2>In Progress</h2>
            <span class="column-count" id="count-in-progress">0</span>
          </div>
          <div class="task-list" id="list-in-progress"></div>
        </div>

        <div class="column" data-status="done">
          <div class="column-header">
            <h2>Done</h2>
            <span class="column-count" id="count-done">0</span>
          </div>
          <div class="task-list" id="list-done"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="task-modal">
      <div class="modal-header">
        <h2 id="modal-title">New Task</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <form class="modal-form" id="task-form">
        <div class="form-group">
          <label for="task-title">Title *</label>
          <input type="text" id="task-title" placeholder="What needs to be done?" required />
        </div>
        <div class="form-group">
          <label for="task-description">Description</label>
          <textarea id="task-description" placeholder="Add more details..." rows="3"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="task-priority">Priority</label>
            <select id="task-priority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          <div class="form-group">
            <label for="task-assignee">Assignee</label>
            <input type="text" id="task-assignee" placeholder="Who's responsible?" />
          </div>
        </div>
        <div class="form-group">
          <label for="task-due">Due Date</label>
          <input type="date" id="task-due" />
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="modal-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary" id="modal-save">Save Task</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
